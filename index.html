<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --muted: #94a3b8;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background-color: var(--card);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        h2 { margin-top: 0; color: var(--accent); font-size: 1.8rem; }
        p { font-size: 0.95rem; color: var(--muted); line-height: 1.5; }

        input[type="email"] {
            width: 100%;
            padding: 12px 16px;
            margin: 1.5rem 0 1rem;
            border: 2px solid #334155;
            border-radius: 8px;
            background: #111827;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="email"]:focus { border-color: var(--accent); }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }

        button:hover { background-color: #7dd3fc; transform: translateY(-1px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        #status {
            margin-top: 1.5rem;
            padding: 10px;
            border-radius: 8px;
            display: none;
            font-size: 0.9rem;
        }
        #status.success { background: rgba(34, 197, 94, 0.2); color: #4ade80; display: block; }
        #status.error { background: rgba(239, 68, 68, 0.2); color: #f87171; display: block; }

        .dev-footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Dev Insights</h2>
    <p>Подпишитесь на обновления разработки и важные фиксы от ILK1042.</p>
    
    <form id="subscribe-form" action="https://formspree.io/f/YOUR_ID" method="POST">
        <input type="email" name="email" id="email" placeholder="email@example.com" required>
        <button type="submit" id="submit-btn">Подписаться</button>
    </form>

    <div id="status"></div>
</div>

<div class="dev-footer">
    [ Сайт находится в разработке ]
</div>

<script>
    const form = document.getElementById("subscribe-form");
    const status = document.getElementById("status");
    const btn = document.getElementById("submit-btn");

    async function handleSubmit(event) {
        event.preventDefault();
        const data = new FormData(event.target);
        btn.disabled = true;
        btn.innerText = "Отправка...";

        fetch(event.target.action, {
            method: form.method,
            body: data,
            headers: { 'Accept': 'application/json' }
        }).then(response => {
            if (response.ok) {
                status.innerHTML = "Готово! Вы в списке рассылки.";
                status.className = "success";
                form.reset();
                form.style.display = "none";
            } else {
                response.json().then(data => {
                    status.innerHTML = "Ошибка: " + (data["errors"] ? data["errors"][0]["message"] : "что-то пошло не так");
                    status.className = "error";
                })
            }
        }).catch(() => {
            status.innerHTML = "Ошибка сети. Повторите позже.";
            status.className = "error";
        }).finally(() => {
            btn.disabled = false;
            if (form.style.display !== "none") btn.innerText = "Подписаться";
        });
    }

    form.addEventListener("submit", handleSubmit);
</script>

</body>
</html>
